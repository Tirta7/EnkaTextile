version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vocpos-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vocpos2026
      POSTGRES_DB: vocpos
    volumes:
      - vocpos_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vocpos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vocpos-app
    restart: always
    env_file:
      - docker.env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  vocpos_db_data:
